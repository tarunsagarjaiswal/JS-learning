    // 🔹 Event Listener in JavaScript

// 👉 Definition:
// An event listener is a function that waits for a specific event (like click, key press, or submit)
// on an element and executes code when that event happens.

// 👉 Syntax:
element.addEventListener("event", callbackFunction, options);

// Parameters:
// 1. "event" → String name of the event (e.g., "click", "keydown", "submit")
// 2. callbackFunction → Function to run when event occurs
// 3. options (optional) → Controls behavior (capture, once, passive)

// 👉 Example 1: Button Click

  alert("Button clicked!");
});

  e.preventDefault(); // stops reload
  alert("Form submitted!");
});

//The event object in JavaScript is automatically created and passed to your event handler whenever an event occurs. It contains all the details about that specific event, so you can inspect what happened and respond accordingly.

/*What the Event Object Contains
type → The kind of event ("click", "keydown", "submit", etc.).

target → The element that triggered the event.

currentTarget → The element the listener is attached to.

key → For keyboard events, which key was pressed.

clientX, clientY → Mouse coordinates relative to the viewport.

preventDefault() → Stops the browser’s default action (e.g., stopping a form from reloading).

stopPropagation() → Prevents the event from bubbling up to parent elements.*/



/*The event object is always passed automatically to your handler.

It gives you context about what happened (which element, which key, which coordinates).

Use its methods (preventDefault, stopPropagation) to control event behavior.*/
