<!-- 9. title.textContent
// → "DOM learnig on chai aur code"
Returns all text inside the element, exactly as it appears in HTML.

Includes hidden text too (like from <span style="display:none">). 
    
    title.innerHTML
// → "DOM learnig on chai aur code"
    Returns the HTML inside the element.

If you had child tags, it would show them.

title.innerText
// → "DOM learnig on chai aur code"
Returns the visible text (what the user sees on the page).

Ignores hidden text (like display:none or visibility:hidden).-->

<!-- 12. // -------------------- QUERY SELECTOR ALL --------------------

// Select ALL <li> elements
const tempLiList = document.querySelectorAll("li");

// querySelectorAll returns a NodeList (looks like array but not exactly an array)
// You cannot directly do tempLiList.style because NodeList has no style property

// Correct way → access individual element by index
tempLiList[0].style.backgroundColor = "green";  // first <li>
tempLiList[1].style.backgroundColor = "blue";   // second <li>

// Or loop through all elements
tempLiList.forEach(li => {
  li.style.backgroundColor = "red";
});

// -------------------- CHECKING TYPE --------------------
console.log(Array.isArray(tempLiList));  
// false → NodeList is NOT a real array

// But NodeList is array-like → you can use forEach, length, index
console.log(tempLiList.length);  // number of <li> elements
console.log(tempLiList[0]);      // first <li> element

// -------------------- QUERY SELECTOR ALL FOR H1 --------------------
const myH1 = document.querySelectorAll("h1");
myH1[0].style.color = "green";   // first <h1>

// -------------------- NOTES --------------------
// querySelectorAll → returns NodeList (array-like, not true array)
// Access elements with [index] or loop with forEach
// Cannot directly apply style to NodeList, only to individual elements
 -->
